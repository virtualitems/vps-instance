map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

upstream app {
    server unix:/var/run/demo.alejandrocr.co/unix.sock;
}

server {
    listen 80;
    listen [::]:80;
    server_name demo.alejandrocr.co;
    http2 on;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name demo.alejandrocr.co;

    charset utf-8;
    http2 on;
    gzip off;

    client_max_body_size 1G;
    client_body_timeout 600s;
    client_header_timeout 600s;
    proxy_connect_timeout 600s;
    proxy_send_timeout 600s;
    proxy_read_timeout 600s;

    include /etc/letsencrypt/options-ssl-nginx.conf;

    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    ssl_certificate /etc/letsencrypt/live/demo.alejandrocr.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/demo.alejandrocr.co/privkey.pem;

    access_log /var/log/nginx/demo.alejandrocr.co/access.log;
    error_log /var/log/nginx/demo.alejandrocr.co/error.log;

    root /home/ec2-user/demo.alejandrocr.co/staticfiles;

    location /static/ {
        alias /home/ec2-user/demo.alejandrocr.co/staticfiles/;
    }

    location /mediafiles/ {
        internal;
        alias /home/ec2-user/demo.alejandrocr.co/mediafiles/;
    }

    location /media/ {
        proxy_pass http://app/media/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /api/ {
        proxy_pass http://app/api/;
        proxy_buffering off;
    }

    location /ws/ {
        proxy_pass http://app/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location / {
        index index.html;
        error_page 404 =200 /index.html;
    }
}
